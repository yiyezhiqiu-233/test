    <script>
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        const infoPanel = document.getElementById('info-panel');
        const infoLines = document.querySelectorAll('.info-line');
        // 获取我的爱好面板和文本行
        const hobbyPanel = document.getElementById('hobby-panel');
        const hobbyLines = document.querySelectorAll('.info-line-hobby');
        // 获取MBIT面板和文本行
        const mbitPanel = document.getElementById('mbit-panel');
        const mbitLines = document.querySelectorAll('.info-line-mbit');
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&?<>{}[]';
        let mouse = { x: -1000, y: -1000 };

        // 获取我的电影面板和文本行
        const moviePanel = document.getElementById('movie-panel');
        const movieLines = document.querySelectorAll('.info-line-movie');

        // 获取我的音乐面板和文本行
        const musicPanel = document.getElementById('music-panel');
        const musicLines = document.querySelectorAll('.info-line-music');

        // 获取我的其他面板和文本行
        const otherPanel = document.getElementById('other-panel');
        const otherLines = document.querySelectorAll('.info-line-other');

        // 获取我的联系面板和文本行
        const callPanel = document.getElementById('call-panel');
        const callLines = document.querySelectorAll('.info-line-call');

        // ========== 新增：连线相关变量 ==========
        const lineCanvas = document.getElementById('line-canvas');
        const lineCtx = lineCanvas.getContext('2d');
        // 定义面板顺序：02 → 01 → 03 → 05 → 04 → 06（box10）
        const panelOrder = ['box2', 'box1', 'box3', 'box5', 'box4', 'box10'];
        let currentConnectFrom = null; // 当前连线的起点
        let currentConnectTo = null;   // 当前连线的终点
        let drawnLines = []; // 新增：记录已绘制的连线，用于保持显示
        let lineOpacity = 0.8; // 新增：控制连线透明度，默认正常

        // ========== 新增：初始化连线Canvas尺寸 ==========
        function initLineCanvas() {
            const container = document.querySelector('.container');
            lineCanvas.width = container.offsetWidth;
            lineCanvas.height = container.offsetHeight;
        }

        // ========== 新增：设置所有连线透明度 ==========
        function setLineOpacity(opacity) {
            lineOpacity = opacity;
            // 重绘所有连线以应用新的透明度
            lineCtx.clearRect(0, 0, lineCanvas.width, lineCanvas.height);
            drawnLines.forEach(line => {
                drawLine(line.from, line.to, false, true);
            });
            // 重绘当前引导线
            if (currentConnectFrom && currentConnectTo) {
                drawLine(currentConnectFrom, currentConnectTo, currentConnectFrom === box6);
            }
        }

        // ========== 修改：绘制淡红色连线（支持透明度控制） ==========
        function drawLine(fromEl, toEl, isFaint = false, isHistory = false) {
            // 仅在绘制新连线（非历史）时清空画布
            if (!isHistory) {
                lineCtx.clearRect(0, 0, lineCanvas.width, lineCanvas.height);
                
                // 先绘制所有历史连线
                drawnLines.forEach(line => {
                    drawLine(line.from, line.to, false, true);
                });
            }
            
            if (!fromEl || !toEl) return;

            // 获取元素中心坐标
            const fromRect = fromEl.getBoundingClientRect();
            const toRect = toEl.getBoundingClientRect();
            const containerRect = document.querySelector('.container').getBoundingClientRect();
            
            const fromX = fromRect.left + fromRect.width/2 - containerRect.left;
            const fromY = fromRect.top + fromRect.height/2 - containerRect.top;
            const toX = toRect.left + toRect.width/2 - containerRect.left;
            const toY = toRect.top + toRect.height/2 - containerRect.top;

            // 绘制连线（使用全局透明度控制）
            lineCtx.beginPath();
            lineCtx.moveTo(fromX, fromY);
            lineCtx.lineTo(toX, toY);
            // 应用透明度：淡色引导线用固定0.3，实线用全局opacity
            const finalOpacity = isFaint ? 0.3 : lineOpacity;
            lineCtx.strokeStyle = `rgba(255, 68, 68, ${finalOpacity})`;
            lineCtx.lineWidth = isFaint ? 1.5 : 2.5;
            lineCtx.lineCap = 'round';
            lineCtx.stroke();

            // 如果是实线连线且未记录，则添加到历史连线列表
            if (!isFaint && !isHistory && fromEl && toEl) {
                // 避免重复添加相同的连线
                const isDuplicate = drawnLines.some(line => 
                    (line.from === fromEl && line.to === toEl) || 
                    (line.from === toEl && line.to === fromEl)
                );
                if (!isDuplicate) {
                    drawnLines.push({ from: fromEl, to: toEl });
                }
            }
        }

        // ========== 修改：清除连线（仅清空当前引导线，保留历史连线） ==========
        function clearLine() {
            // 只重置当前连线状态，不清除历史连线
            currentConnectFrom = null;
            currentConnectTo = null;
            // 重绘所有历史连线
            lineCtx.clearRect(0, 0, lineCanvas.width, lineCanvas.height);
            drawnLines.forEach(line => {
                drawLine(line.from, line.to, false, true);
            });
        }

        /** 背景网格逻辑 **/
        let dots = [];
        function initBackground() {
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
            dots = [];
            for (let x = 0; x < bgCanvas.width + 35; x += 35) {
                for (let y = 0; y < bgCanvas.height + 35; y += 35) {
                    dots.push({ x, y });
                }
            }
            // 新增：初始化连线Canvas
            initLineCanvas();
        }

        function drawBackground() {
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            dots.forEach(dot => {
                const distToMouse = Math.hypot(dot.x - mouse.x, dot.y - mouse.y);
                let alpha = 0.15;
                let radius = 1.2;
                if (distToMouse < 150) {
                    const force = (150 - distToMouse) / 150;
                    radius = 1.2 + (force * 3);
                    alpha = 0.45;
                }
                bgCtx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                bgCtx.beginPath();
                bgCtx.arc(dot.x, dot.y, radius, 0, Math.PI * 2);
                bgCtx.fill();
            });
            requestAnimationFrame(drawBackground);
        }

        /** 核心功能：逐行乱码解码（用于头像、我的爱好、音乐）**/
        function decodeEffect(element, delay = 0) {
            const finalValue = element.getAttribute('data-text');
            // 兼容空文本：如果data-text为空，直接返回
            if(!finalValue) return;
            let iteration = 0;
            element.innerText = "";
            
            setTimeout(() => {
                // 清除可能存在的旧定时器，避免叠加
                if(element.interval) clearInterval(element.interval);
                element.interval = setInterval(() => {
                    element.innerText = finalValue.split("")
                        .map((char, index) => {
                            if(index < iteration) return finalValue[index];
                            return chars[Math.floor(Math.random() * chars.length)];
                        }).join("");
                    
                    if(iteration >= finalValue.length) clearInterval(element.interval);
                    iteration += 1 / 2;
                }, 40);
            }, delay);
        }

        /** 无乱码快速逐行显示（用于我的MBIT/Music色块）**/
        function showTextDirectly(element, delay = 0) {
            const finalValue = element.getAttribute('data-text');
            // 兼容空文本
            if(!finalValue) return;
            // 直接设置文本，无乱码
            setTimeout(() => {
                element.innerText = finalValue;
                element.style.opacity = 1; // 显示当前行
            }, delay);
        }

        /** 交互逻辑 **/
        const box6 = document.querySelector('.box6'); // 中心头像
        const box1 = document.querySelector('.box1'); // 我的爱好
        const box2 = document.querySelector('.box2'); // 我的MBIT
        const box5 = document.querySelector('.box5'); // 我的音乐
        const box3 = document.querySelector('.box3'); // 我的电影
        const box4 = document.querySelector('.box4'); // 我的其他
        const box10 = document.querySelector('.box10'); // 我的联系
        const allBoxes = document.querySelectorAll('.box');

        // ========== 新增：所有面板悬停时控制红线透明度 ==========
        allBoxes.forEach(box => {
            box.addEventListener('mouseenter', () => {
                if (box.classList.contains('hidden')) return;
                // 所有红线变淡
                setLineOpacity(0.3);
            });
            
            box.addEventListener('mouseleave', () => {
                // 恢复红线正常透明度
                setLineOpacity(0.8);
            });
        });

        // ========== 新增：中心头像悬停逻辑（连接02面板） ==========
        box6.addEventListener('mouseenter', () => {
            allBoxes.forEach(b => {
                if(b === box6) b.classList.add('selected');
                else if(!b.classList.contains('hidden')) b.classList.add('unselected');
            });

            infoPanel.style.display = 'block';
            infoLines.forEach((line, index) => {
                decodeEffect(line, index * 300); 
            });

            // 绘制中心头像到02面板的淡红线
            if (box2 && !box2.classList.contains('hidden')) {
                currentConnectFrom = box6;
                currentConnectTo = box2;
                drawLine(box6, box2, true); // 淡色连线
            }
        });

        box6.addEventListener('mouseleave', () => {
            allBoxes.forEach(b => {
                b.classList.remove('selected', 'unselected');
            });
            infoPanel.style.display = 'none';
            infoLines.forEach(line => {
                clearInterval(line.interval);
                line.innerText = "";
            });
            // 移除：不再清除连线，仅保留历史连线
            // if (currentConnectTo === box2 && !box2.matches(':hover')) {
            //     clearLine();
            // }
        });

        // ========== 新增：面板连线通用逻辑 ==========
        function bindPanelLine(panelEl, nextPanelClass) {
            // 鼠标进入当前面板
            panelEl.addEventListener('mouseenter', () => {
                if (panelEl.classList.contains('hidden')) return;
                
                // 绘制当前面板与起点的实线连线
                if (currentConnectFrom) {
                    drawLine(currentConnectFrom, panelEl, false); // 实线
                }

                // 设置下一个连线起点为当前面板
                currentConnectFrom = panelEl;
                
                // 找到下一个面板并绘制淡红线（如果存在）
                const nextPanel = document.querySelector(`.${nextPanelClass}`);
                if (nextPanel && !nextPanel.classList.contains('hidden')) {
                    currentConnectTo = nextPanel;
                    drawLine(panelEl, nextPanel, true); // 淡色连线到下一个面板
                }
            });

            // 鼠标离开当前面板
            panelEl.addEventListener('mouseleave', () => {
                // 移除：不再清除连线，保留历史连线
                // const nextPanel = document.querySelector(`.${nextPanelClass}`);
                // if (currentConnectTo === nextPanel && (!nextPanel || !nextPanel.matches(':hover'))) {
                //     clearLine();
                // }
            });
        }

        // ========== 绑定各面板的连线逻辑 ==========
        // 02面板 → 01面板
        bindPanelLine(box2, 'box1');
        // 01面板 → 03面板
        bindPanelLine(box1, 'box3');
        // 03面板 → 05面板
        bindPanelLine(box3, 'box5');
        // 05面板 → 04面板
        bindPanelLine(box5, 'box4');
        // 04面板 → 06面板（box10）
        bindPanelLine(box4, 'box10');
        // 06面板（box10）→ 无下一个面板
        box10.addEventListener('mouseenter', () => {
            if (box10.classList.contains('hidden')) return;
            if (currentConnectFrom) {
                drawLine(currentConnectFrom, box10, false); // 实线连线
            }
        });
        box10.addEventListener('mouseleave', () => {
            // 移除：最后一个面板离开也不清除连线
            // clearLine();
        });

        // 我的MBIT交互逻辑（原有逻辑保留，新增连线触发）
        box2.addEventListener('mouseenter', () => {
            if(box2.classList.contains('hidden')) return;
            allBoxes.forEach(b => {
                if(b === box2) b.classList.add('selected');
                else if(!b.classList.contains('hidden')) b.classList.add('unselected');
            });
            
            mbitLines.forEach(line => {
                line.innerText = "";
                line.style.opacity = 0;
            });
            
            mbitPanel.style.display = 'block';
            mbitLines.forEach((line, index) => {
                showTextDirectly(line, index * 50); 
            });
            
            // 新增：色块自身文本解码
            box2.querySelectorAll('.box-title, .box-desc').forEach(el => {
                decodeEffect(el, 0);
            });
        });

        box2.addEventListener('mouseleave', () => {
            allBoxes.forEach(b => b.classList.remove('selected', 'unselected'));
            mbitPanel.style.display = 'none';
            mbitLines.forEach(line => {
                line.innerText = "";
                line.style.opacity = 0;
            });
        });

        // 我的爱好交互逻辑（原有逻辑保留）
        box1.addEventListener('mouseenter', () => {
            if(box1.classList.contains('hidden')) return;
            allBoxes.forEach(b => {
                if(b === box1) b.classList.add('selected');
                else if(!b.classList.contains('hidden')) b.classList.add('unselected');
            });
            
            hobbyLines.forEach(line => {
                line.innerText = "";
                clearInterval(line.interval);
            });
            
            hobbyPanel.style.display = 'block';
            hobbyLines.forEach((line, index) => {
                decodeEffect(line, index * 300); 
            });
            
            box1.querySelectorAll('.box-title, .box-desc').forEach(el => {
                decodeEffect(el, 0);
            });
        });

        box1.addEventListener('mouseleave', () => {
            allBoxes.forEach(b => b.classList.remove('selected', 'unselected'));
            hobbyPanel.style.display = 'none';
            hobbyLines.forEach(line => {
                clearInterval(line.interval);
                line.innerText = "";
            });
        });

        // 我的音乐交互逻辑（原有逻辑保留）
        box5.addEventListener('mouseenter', () => {
            if(box5.classList.contains('hidden')) return;
            allBoxes.forEach(b => {
                if(b === box5) b.classList.add('selected');
                else if(!b.classList.contains('hidden')) b.classList.add('unselected');
            });
            
            musicLines.forEach(line => {
                line.innerText = "";
                line.style.opacity = 0;
            });
            
            musicPanel.style.display = 'block';
            musicLines.forEach((line, index) => {
                showTextDirectly(line, index * 50); 
            });
            
            // 新增：色块自身文本解码
            box5.querySelectorAll('.box-title, .box-desc').forEach(el => {
                decodeEffect(el, 0);
            });
        });

        box5.addEventListener('mouseleave', () => {
            allBoxes.forEach(b => b.classList.remove('selected', 'unselected'));
            musicPanel.style.display = 'none';
            musicLines.forEach(line => {
                line.innerText = "";
                line.style.opacity = 0;
            });
        });

        // 我的电影交互逻辑（原有逻辑保留）
        box3.addEventListener('mouseenter', () => {
            if(box3.classList.contains('hidden')) return;
            allBoxes.forEach(b => {
                if(b === box3) b.classList.add('selected');
                else if(!b.classList.contains('hidden')) b.classList.add('unselected');
            });
            
            movieLines.forEach(line => {
                line.innerText = "";
                clearInterval(line.interval);
            });
            
            moviePanel.style.display = 'block';
            movieLines.forEach((line, index) => {
                decodeEffect(line, index * 300); 
            });
            
            // 新增：色块自身文本解码
            box3.querySelectorAll('.box-title, .box-desc').forEach(el => {
                decodeEffect(el, 0);
            });
        });

        box3.addEventListener('mouseleave', () => {
            allBoxes.forEach(b => b.classList.remove('selected', 'unselected'));
            moviePanel.style.display = 'none';
            movieLines.forEach(line => {
                clearInterval(line.interval);
                line.innerText = "";
            });
        });
        
        // 我的其他交互逻辑（原有逻辑保留）
        box4.addEventListener('mouseenter', () => {
            if(box4.classList.contains('hidden')) return;
            allBoxes.forEach(b => {
                if(b === box4) b.classList.add('selected');
                else if(!b.classList.contains('hidden')) b.classList.add('unselected');
            });
        
            // 新增：清空旧文本+重置opacity
            otherLines.forEach(line => {
                line.innerText = "";
                line.style.opacity = 0;
                clearInterval(line.interval);
            });
            
            otherPanel.style.display = 'block';
            otherLines.forEach((line, index) => {
                decodeEffect(line, index * 200);
                // 解码后显示文本行
                setTimeout(() => {
                    line.style.opacity = 1;
                }, index * 200 + 500);
            });
            
            // 新增：色块自身文本解码
            box4.querySelectorAll('.box-title, .box-desc').forEach(el => {
                decodeEffect(el, 0);
            });
        });

        box4.addEventListener('mouseleave', () => {
            allBoxes.forEach(b => b.classList.remove('selected', 'unselected'));
            otherPanel.style.display = 'none';
            otherLines.forEach(line => {
                clearInterval(line.interval);
                line.innerText = "";
                line.style.opacity = 0;
            });
        });

        // 联系方式 (Box 10) 交互逻辑（原有逻辑保留）
        box10.addEventListener('mouseenter', () => {
            if(box10.classList.contains('hidden')) return;
            allBoxes.forEach(b => {
                if(b === box10) b.classList.add('selected');
                else if(!b.classList.contains('hidden')) b.classList.add('unselected');
            });
        
            // 新增：清空旧文本+重置opacity
            callLines.forEach(line => {
                line.innerText = "";
                line.style.opacity = 0;
                clearInterval(line.interval);
            });
            
            callPanel.style.display = 'block';
            callLines.forEach((line, index) => {
                decodeEffect(line, index * 200);
                // 解码后显示文本行
                setTimeout(() => {
                    line.style.opacity = 1;
                }, index * 200 + 500);
            });
            
            // 新增：色块自身文本解码
            box10.querySelectorAll('.box-title, .box-desc').forEach(el => {
                decodeEffect(el, 0);
            });
        });

        box10.addEventListener('mouseleave', () => {
            allBoxes.forEach(b => b.classList.remove('selected', 'unselected'));
            callPanel.style.display = 'none';
            callLines.forEach(line => {
                clearInterval(line.interval);
                line.innerText = "";
                line.style.opacity = 0;
            });
        });

        // 统一的基础悬停逻辑（仅绑定未自定义的色块，避免重复）
        allBoxes.forEach(box => {
            const specialBoxes = [box6, box1, box2, box5, box3, box4, box10];
            if(specialBoxes.includes(box)) return; 

            box.addEventListener('mouseenter', () => {
                if(box.classList.contains('hidden')) return;
                allBoxes.forEach(b => {
                    if(b === box) b.classList.add('selected');
                    else if(!b.classList.contains('hidden')) b.classList.add('unselected');
                });
                box.querySelectorAll('.box-title, .box-desc').forEach(el => decodeEffect(el));
            });
            
            box.addEventListener('mouseleave', () => {
                allBoxes.forEach(b => b.classList.remove('selected', 'unselected'));
            });
        });

        // 鼠标移动显示隐藏色块
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX; mouse.y = e.clientY;
            const cRect = document.querySelector('.container').getBoundingClientRect();
            allBoxes.forEach(box => {
                if (!box.classList.contains('hidden')) return;
                const r = box.getBoundingClientRect();
                const bCX = r.left + r.width/2 - cRect.left;
                const bCY = r.top + r.height/2 - cRect.top;
                if (Math.hypot(e.clientX - cRect.left - bCX, e.clientY - cRect.top - bCY) < 150) {
                    box.classList.remove('hidden');
                    box.classList.add('visible');
                }
            });
        });

        // 初始化
        window.addEventListener('load', () => { 
            initBackground(); 
            drawBackground(); 
        });
        window.addEventListener('resize', () => {
            initBackground();
            // 窗口调整时重新绘制所有连线（历史+当前）
            lineCtx.clearRect(0, 0, lineCanvas.width, lineCanvas.height);
            drawnLines.forEach(line => {
                drawLine(line.from, line.to, false, true);
            });
            if (currentConnectFrom && currentConnectTo) {
                drawLine(currentConnectFrom, currentConnectTo, currentConnectFrom === box6);
            }
        });
    </script>
</body>
